<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fraction thingy</title>
</head>
<body>
  <h1>Fraction Unicode stuff (family friendly)!</h1>
  <p><a href="https://na-tap.github.io/index.html">Back to main page</a><br>
    ⁄ &lt; So this is a slash (you knew that). Let's make a fraction with it!</p>

  <form>
    <label for="numerator">Numerator:</label>
    <input type="number" id="numerator">

    <label for="denominator">Denominator:</label>
    <input type="number" id="denominator">

    <button type="button" onclick="makeFraction()">Generate</button>
  </form>
  <p id="result"></p>

  <script>
    function makeFraction() {
      const n = document.getElementById('numerator').value;
      const d = document.getElementById('denominator').value;
      document.getElementById('result').textContent = n + '⁄' + d;
    }
  </script>
</body>
</html>
